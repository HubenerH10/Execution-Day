<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ICE · Simulador do Líder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14; --panel:#141923; --panel-2:#1a212d; --line:#283242;
  --txt:#e8eef6; --muted:#8a98ab; --faint:#5c6878;
  --brand:#e8131e; --brand-2:#ff4d57;
  --good:#28d39a; --warn:#f5a623; --crit:#ff5e6c; --info:#4aa8ff;
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --r:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:
    radial-gradient(1200px 600px at 80% -10%, rgba(232,19,30,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(40,211,154,.06), transparent 55%),
    var(--bg);
  color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.num{font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
h1,h2,h3{font-family:'Archivo',sans-serif;margin:0;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer}
a{color:inherit}

/* ---------- HEADER ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(12,15,20,.82);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.head-in{max-width:1400px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.mark{width:42px;height:42px;border-radius:11px;background:linear-gradient(145deg,var(--brand),#a30c14);
  display:grid;place-items:center;box-shadow:0 6px 18px rgba(232,19,30,.4);flex:none}
.mark svg{width:24px;height:24px}
.brand h1{font-size:18px;font-weight:800;line-height:1.05}
.brand .sub{font-size:11.5px;color:var(--muted);font-weight:500}
.filters{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;align-items:center}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-family:'IBM Plex Mono',monospace}
select,.chip-in{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:9px;
  padding:7px 11px;font-family:inherit;font-size:13px;font-weight:600}
select:focus,input:focus{outline:2px solid var(--brand-2);outline-offset:1px}
.userbox{display:flex;align-items:center;gap:9px;padding:6px 12px;background:var(--panel-2);border:1px solid var(--line);border-radius:30px}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#3b4a5e,#1d2530);display:grid;place-items:center;font-weight:700;font-size:12px;color:#cdd8e6}
.userbox .meta{font-size:11px;line-height:1.15}
.userbox .meta b{font-size:12.5px}

/* ---------- NAV ---------- */
nav.tabs{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
.tab{background:none;border:none;color:var(--muted);padding:13px 16px;font-size:13px;font-weight:600;
  border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--txt);border-bottom-color:var(--brand)}

main{max-width:1400px;margin:0 auto;padding:26px 28px 80px}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.sec-h{display:flex;align-items:baseline;gap:14px;margin:6px 0 16px}
.sec-h h2{font-size:21px;font-weight:800}
.sec-h .desc{color:var(--muted);font-size:13px}
.grid{display:grid;gap:16px}

.card{background:linear-gradient(180deg,var(--panel),#11161f);border:1px solid var(--line);
  border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}

/* ---------- KPI STRIP ---------- */
.kpis{grid-template-columns:1.4fr 1fr 1fr 1fr 1.2fr}
.kpi .big{font-size:40px;line-height:1;margin-top:8px}
.kpi .unit{font-size:18px;color:var(--muted);font-weight:700}
.kpi .delta{font-size:12px;font-weight:700;margin-top:7px;display:inline-flex;gap:5px;align-items:center}
.up{color:var(--good)} .down{color:var(--crit)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}

/* gauge */
.gaugewrap{display:flex;align-items:center;gap:18px}
.gauge{position:relative;width:128px;height:128px;flex:none}
.gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .center .v{font-size:30px;line-height:1}
.gauge .center .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* ---------- SIMULATOR ---------- */
.sim-grid{grid-template-columns:380px 1fr}
.seg-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.seg-tab{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600}
.seg-tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.slider-row{margin:15px 0}
.slider-row .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.slider-row .name{font-weight:600;font-size:13.5px}
.slider-row .wt{font-size:10.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace;margin-left:6px}
.slider-row .val{font-family:'Archivo';font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#fff;border:3px solid var(--brand);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
input[type=range]:disabled{opacity:.35}
input[type=range]:disabled::-webkit-slider-thumb{border-color:var(--faint)}
.bar-track{height:8px;border-radius:6px;background:var(--panel-2);overflow:hidden;position:relative}
.bar-track .now{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .4s ease}
.bar-track .tgt{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fff;opacity:.7}
.row-bar{display:grid;grid-template-columns:120px 1fr 92px;gap:10px;align-items:center;margin:11px 0}
.row-bar .lab{font-size:12.5px;font-weight:600}
.row-bar .nums{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right}
.btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--panel-2);color:var(--txt);border-radius:9px;padding:9px 14px;font-size:12.5px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--brand-2)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.ghost{background:none}
.assump{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.3);border-radius:10px;padding:12px 14px;margin-top:14px}
.assump label{display:block;font-size:11px;color:var(--warn);font-weight:700;margin-bottom:6px;letter-spacing:.03em}
.assump input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.assump .hint{font-size:10.5px;color:var(--faint);margin-top:6px}

/* scenario compare */
.scen{grid-template-columns:repeat(3,1fr)}
.scen .card{position:relative;overflow:hidden}
.scen .tagline{position:absolute;top:0;left:0;right:0;height:3px}
.scen .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.scen .v{font-size:46px;line-height:1;margin:6px 0}
.scen .meta{font-size:12px;color:var(--muted)}
.fin-banner{margin-top:16px;background:linear-gradient(110deg,rgba(40,211,154,.12),rgba(74,168,255,.08));
  border:1px solid rgba(40,211,154,.3);border-radius:var(--r);padding:22px 26px;display:flex;flex-wrap:wrap;gap:30px;align-items:center}
.fin-banner .blk .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.fin-banner .blk .v{font-size:34px;line-height:1.05;margin-top:4px}
.fin-banner .blk .v small{font-size:16px;color:var(--muted);font-weight:700}

/* heatmap */
.heat{width:100%;border-collapse:separate;border-spacing:4px}
.heat th{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:6px;text-align:center}
.heat th.rowh,.heat td.rowh{text-align:left;font-weight:700;font-size:12.5px;white-space:nowrap;color:var(--txt);text-transform:none;letter-spacing:0;min-width:120px}
.heat td{text-align:center;border-radius:9px;padding:13px 6px;font-family:'Archivo';font-weight:800;font-size:15px;color:#0c0f14;position:relative}
.heat td.na{background:var(--panel-2)!important;color:var(--faint)}
.heat td .pw{display:block;font-size:8.5px;font-weight:600;opacity:.65;font-family:'IBM Plex Mono',monospace}
.heat td.rowh .pesoseg{display:block;font-size:10px;color:var(--faint);font-weight:500;font-family:'IBM Plex Mono',monospace}
.legend{display:flex;gap:16px;align-items:center;margin-top:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.legend .sw{display:inline-block;width:14px;height:14px;border-radius:4px;margin-right:5px;vertical-align:-2px}

/* ranking */
.opp{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.opp:last-child{border-bottom:none}
.opp .rk{font-family:'Archivo';font-weight:800;font-size:18px;color:var(--faint);width:30px;flex:none;text-align:center}
.opp .info{flex:1;min-width:0}
.opp .info .t{font-weight:700;font-size:14px}
.opp .info .s{font-size:12px;color:var(--muted)}
.opp .mini{flex:1;max-width:200px}
.opp .imp{text-align:right;flex:none;min-width:150px}
.opp .imp .pts{font-family:'Archivo';font-weight:800;font-size:18px;color:var(--good)}
.opp .imp .rs{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* benchmark + gc */
.bench-row{display:grid;grid-template-columns:120px 1fr 74px;gap:12px;align-items:center;margin:9px 0}
.bench-row .nm{font-size:12.5px;font-weight:600}
.bench-row .nm small{display:block;color:var(--faint);font-size:10px;font-family:'IBM Plex Mono',monospace}
.gc-row{display:grid;grid-template-columns:60px 1fr 50px;gap:10px;align-items:center;margin:7px 0;font-size:13px}
.gc-row .gnm{font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:12px}

/* recommendations */
.rec{display:flex;gap:14px;padding:16px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);margin-bottom:12px}
.rec .ic{width:40px;height:40px;border-radius:10px;flex:none;display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:16px}
.rec .body{flex:1}
.rec .body h4{font-size:15px;font-weight:700;margin:0 0 4px;font-family:'Inter'}
.rec .body p{margin:0;font-size:13px;color:var(--muted)}
.rec .body .tag{display:inline-block;margin-top:8px;margin-right:6px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace}

.spark{display:flex;align-items:flex-end;gap:8px;height:70px}
.spark .b{flex:1;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--brand-2),var(--brand));position:relative;transition:.4s;min-height:6px}
.spark .b span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.spark .b em{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--faint);font-style:normal}

.note{font-size:11px;color:var(--faint);margin-top:10px;line-height:1.5}
.foot{text-align:center;color:var(--faint);font-size:11.5px;padding:30px 0 0;border-top:1px solid var(--line);margin-top:40px}

@media(max-width:1080px){.kpis,.scen{grid-template-columns:1fr 1fr}.sim-grid{grid-template-columns:1fr}}
@media(max-width:680px){.kpis,.scen{grid-template-columns:1fr}.head-in{padding:12px 16px}main{padding:18px 16px 60px}
  .opp{flex-wrap:wrap}.opp .mini{order:5;max-width:none;width:100%}.heat{font-size:11px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>


<style>
.bar2{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:16px}
.bar2 .f{display:flex;flex-direction:column;gap:3px}.bar2 label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-family:'IBM Plex Mono',monospace}
.bar2 input,.bar2 select{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;font-weight:600;font-size:13px}
.cbtn{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.cbtn:hover{border-color:var(--brand-2)}.cbtn.go{background:linear-gradient(135deg,var(--brand),#a30c14);color:#fff;border:none}.cbtn.good{background:var(--good);color:#06281e;border:none}.cbtn.sm{padding:5px 9px;font-size:11px}
.kpi6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:14px}
.kc{background:linear-gradient(180deg,var(--panel),#11161f);border:1px solid var(--line);border-radius:13px;padding:14px 15px}
.kc .l{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;font-family:'IBM Plex Mono',monospace}
.kc .v{font-family:'Archivo';font-weight:800;font-size:23px;margin-top:6px;line-height:1;transition:color .3s}.kc .v small{font-size:12px;color:var(--muted)}.kc .s{font-size:9.5px;color:var(--faint);margin-top:4px}
.warnbar{background:rgba(245,76,76,.09);border:1px solid rgba(245,76,76,.3);border-radius:12px;padding:11px 16px;margin-bottom:16px;font-size:13px;display:flex;gap:10px;align-items:center}.warnbar b{color:var(--crit)}
.opp-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.pilcard{border:1px solid var(--line);border-radius:13px;margin-bottom:11px;overflow:hidden;background:var(--panel)}.pilcard.open{border-color:var(--brand-2)}
.pilhead{display:grid;grid-template-columns:150px 1fr 92px 70px 132px 26px;gap:12px;align-items:center;padding:13px 15px;cursor:pointer}.pilhead:hover{background:rgba(255,255,255,.03)}
.pilhead .pq{font-weight:700;font-size:13px}.pilhead .pq small{display:block;color:var(--faint);font-size:10px;font-weight:500}
.pilhead .met{text-align:right;font-family:'Archivo';font-weight:800}.pilhead .cm{font-size:11px;text-align:right}
.chev{transition:.2s;color:var(--muted);text-align:center}.pilcard.open .chev{transform:rotate(90deg)}
.pilbody{display:none;border-top:1px solid var(--line);background:#0d1117}.pilcard.open .pilbody{display:block}
.tools{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:11px 15px;border-bottom:1px solid var(--line)}
.tools input{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 9px;font-size:12px;flex:1;min-width:120px}
.tools .dft{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 9px;font-size:11.5px;font-weight:600}
.pdvlist{max-height:340px;overflow:auto;padding:4px 0}
.pdvrow{display:grid;grid-template-columns:1fr 90px 210px;gap:10px;align-items:center;padding:8px 15px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12.5px}
.pdvrow.on{background:rgba(40,211,154,.08)}
.pdvrow .nm{font-weight:600}.pdvrow .meta{font-size:10.5px;color:var(--faint)}
.pdvrow .pe{text-align:right;font-family:'IBM Plex Mono';font-weight:700;color:var(--crit)}.pdvrow .pe.on{color:var(--good)}
.acaosel{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:6px 7px;font-size:11px;font-weight:600;font-family:inherit}
.acaosel.on{border-color:var(--good);color:var(--good);background:rgba(40,211,154,.06)}
.planrow{display:flex;gap:8px;align-items:center;padding:2px 15px 11px 15px;background:rgba(74,168,255,.05);border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap}
.planrow .pllbl{font-size:10px;color:var(--brand-2);font-weight:700}.planrow .plu{font-size:10.5px;color:var(--faint);margin-left:-4px}
.pli{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 8px;font-size:11.5px;font-family:inherit}.pli:focus{border-color:var(--brand-2);outline:none}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.plan{background:linear-gradient(180deg,var(--panel),#11161f);border:1px solid var(--line);border-radius:14px;padding:16px;position:sticky;top:16px}
.plan h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:0 0 10px}
.gauge-mid{width:150px;height:150px;position:relative;margin:0 auto}.gauge-mid .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.planitem{padding:9px 0;border-bottom:1px solid var(--line)}.planitem .t{font-size:12px;font-weight:700}.planitem .m{font-size:10.5px;color:var(--muted)}
.empty{color:var(--faint);font-size:12.5px;text-align:center;padding:18px 0}
.reco{background:linear-gradient(110deg,rgba(40,211,154,.12),rgba(74,168,255,.07));border:1px solid rgba(40,211,154,.3);border-radius:14px;padding:16px 18px;margin-bottom:16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.reco .ic{width:42px;height:42px;border-radius:11px;background:var(--good);display:grid;place-items:center;font-size:20px}.reco .tx{flex:1;min-width:220px}.reco h4{margin:0 0 3px;font-size:14px}.reco p{margin:0;font-size:12.5px;color:var(--muted)}

    else if(kind==='alta')why=`Faltam <b>${nf(d.rem,0)} pts</b> (${nf(o.score)}%)${d.ci?` · ${d.ci} já com ação`:''}. Bom retorno depois dos críticos.`;
    else why=`Execução já em <b>${nf(o.score)}%</b> — perto do teto. Restam ${nf(d.rem,0)} pts; foque em <b>não regredir</b> e use como referência.`;
    return `<div class="inscard" style="border-left-color:${cor}"><div class="ih"><b>${o.pilarLabel}</b><span class="imp" style="color:${kind==='manut'?'var(--info)':'var(--good)'}">${kind==='manut'?'proteger':'+'+nf(d.remIce,2)+' ICE'}</span></div><div class="iw">${why}</div><div class="ia">Ação típica: <b>${DFT[o.pilar]}</b></div></div>`;};
  const sec=(tt,arr,kind)=>arr.length?`<div class="inssec"><div class="insh" style="color:${kind==='crit'?'var(--crit)':kind==='alta'?'var(--warn)':'var(--info)'}">${tt}</div><div class="insgrid">${arr.map(d=>card(d,kind)).join('')}</div></div>`:'';
  const doneHTML=done.length?`<div class="inssec"><div class="insh" style="color:var(--good)">✅ JÁ ENDEREÇADO</div><div class="insgrid">${done.map(d=>`<div class="inscard" style="border-left-color:var(--good)"><div class="ih"><b>${d.o.pilarLabel}</b><span class="imp" style="color:var(--good)">${nf(d.cp,0)} pts ✓</span></div><div class="iw">Todos os pontos perdidos deste pilar já têm ação de reversão definida.</div></div>`).join('')}</div></div>`:'';
  const faltam=Math.max(0,g.perdidos_total-t.cp);
  const allDone=open.length===0;
  return `<div class="inspanel"><div class="inptop"><div><div class="eyebrow">Cenário da gerência — já considerando o seu preenchimento</div><div style="font-family:Archivo;font-weight:800;font-size:20px">${nf(g.ice)}% <span style="color:var(--muted)">→</span> <span style="color:${colorFor(t.ice)}">${nf(t.ice)}%</span> <span style="font-size:12px;color:var(--muted)">simulado</span> <span style="color:var(--muted)">→</span> <span style="color:var(--good)">${nf(pot)}%</span> <span style="font-size:12px;color:var(--muted)">potencial</span></div><div style="font-size:12px;color:var(--muted)">já revertido <b style="color:var(--good)">${nf(t.cp,0)} pts</b> · faltam <b style="color:var(--warn)">${nf(faltam,0)} pts</b> para o potencial</div></div><div style="display:flex;gap:8px"><button class="cbtn good" id="insApply">⚡ Aplicar prioridades</button><button class="cbtn" id="insClose">✕</button></div></div>
    ${allDone?'<div class="insfoot" style="color:var(--good)">🎉 Todos os pontos perdidos da gerência já têm ação de reversão definida.</div>':''}
    ${sec('🔴 Prioridade crítica — onde está o maior ganho restante',crit,'crit')}
    ${sec('🟡 Alta prioridade — próximos passos',alta,'alta')}
    ${sec('🔵 Manutenção — proteja o que já está bom',protect,'manut')}
    ${doneHTML}
    <div class="insfoot">📚 <b>Como priorizar (a lógica que o time deve aprender):</b> 1) onde se perde mais pontos, recuperar rende mais ICE; 2) ataque primeiro <b>alto impacto + menor esforço</b>; 3) proteja o que já está no alvo. O "Otimizar" aplica essa regra automaticamente — mas <b>em quais clientes agir é decisão do líder</b>.</div></div>`;}
function bindInsights(){const ia=document.getElementById('insApply');if(ia)ia.onclick=()=>{showIns=false;optimize();};const ic=document.getElementById('insClose');if(ic)ic.onclick=()=>{showIns=false;render();};}
function refreshInsights(){if(!showIns)return;const ip=document.querySelector('.inspanel');if(!ip)return;const w=document.createElement('div');w.innerHTML=insightsPanel();ip.replaceWith(w.firstElementChild);bindInsights();}
function fill(){document.getElementById('selGC').innerHTML=Object.keys(GCS).map(g=>`<option value="${g}">${g}</option>`).join('');document.getElementById('selGC').value=curGC;document.getElementById('lider').value=lider;document.getElementById('meta').value=meta;}
function render(){
  const g=G(),t=totals();const v=document.getElementById('view');
  let best=null;g.opps.forEach(o=>{const rem=o.perdidos-pilarPts(o);if(rem>0&&(!best||rem>best.rem))best={o,rem};});
  const k=(l,val,s,c,id)=>`<div class="kc"><div class="l">${l}</div><div class="v" ${id?`id="${id}"`:''} ${c?`style="color:${c}"`:''}>${val}</div><div class="s">${s||''}</div></div>`;
  v.innerHTML=`
  <div class="reco"><div class="ic">💡</div><div class="tx"><h4>Onde focar a reversão</h4>
    <p>${best?`<b>${best.o.pilarLabel}</b> ainda tem <b>${ptos(best.rem)}</b> perdidos sem ação definida. Abra o pilar e atribua a ação aos PDVs prioritários.`:'Todos os pontos perdidos já têm ação de reversão. 👏'}</p></div></div>
  ${showIns?insightsPanel():''}
  <div class="kpi6">
    ${k('ICE gerência',nf(g.ice)+'<small>%</small>','hoje',colorFor(g.ice))}
    ${k('ICE simulado',nf(t.ice)+'<small>%</small>','com reversões',colorFor(t.ice),'kIce')}
    ${k('Gap p/ meta',((t.ice-meta)>=0?'+':'')+nf(t.ice-meta)+'<small> pts</small>','meta '+meta,(t.ice-meta)>=0?'var(--good)':'var(--warn)','kGap')}
    ${k('Pontos revertidos',ptos(t.cp),'de '+ptos(t.perdTot),'var(--good)','kCp')}
    ${k('Clientes com ação',t.cn,'de '+t.ln+' com perda','var(--brand-2)','kCn')}
    ${k('Sem reversão',t.naoRev,'clientes sem ação','var(--crit)','kNr')}
  </div>
  <div id="warn"></div>
  <div class="opp-layout">
    <div><div class="sec-h" style="margin-bottom:10px"><h2 style="font-size:16px">${curGC} · ${g.nome} — pontos perdidos por pilar</h2><span class="desc">Abra cada pilar e defina a ação de reversão de cada cliente.</span></div>
      <div id="pils"></div></div>
    <div class="plan"><h3>Compromisso · ${curGC}</h3><div class="gauge-mid" id="gg"></div>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted)"><b style="color:var(--good)">${t.cn}</b> clientes · <b style="color:var(--good)">${ptos(t.cp)}</b></div>
      <div id="planList" style="margin-top:12px"></div></div>
  </div>`;
  document.getElementById('gg').innerHTML=gauge(t.ice,150,meta)+`<div class="center"><div class="num" style="font-size:30px;color:${colorFor(t.ice)}">${nf(t.ice)}</div><div class="eyebrow">simulado</div></div>`;
  drawWarn();drawPils();drawPlan();
  bindInsights();
}
function drawWarn(){const t=totals();const el=document.getElementById('warn');el.innerHTML=(t.naoRev>0&&t.cn>0)?`<div class="warnbar">⚠ <span><b>${t.naoRev} clientes</b> seguem SEM REVERSÃO — <b>${ptos(t.perdTot-t.cp)}</b> continuam perdidos. Defina a ação para comprometê-los.</span></div>`:'';}
function drawPils(){const g=G();
  document.getElementById('pils').innerHTML=g.opps.map(o=>{const cidx=committedIdx(o);const cp=pilarPts(o);const op=openP[curGC]===o.pilar;
    return `<div class="pilcard ${op?'open':''}" data-p="${o.pilar}">
      <div class="pilhead" data-tg="${o.pilar}">
        <div><span class="tag" style="background:var(--panel-2);color:var(--muted)">${o.pilarLabel}</span></div>
        <div class="pq">${o.pergunta}<small>${o.nPdv} clientes perdendo · ex.: ${o.qreal}</small></div>
        <div class="met" style="color:var(--crit)">${nf(o.perdidos,0)}<div style="font-size:9px;color:var(--faint);font-weight:500">perdidos</div></div>
        <div class="met gh" style="color:var(--good)">+${nf(o.ganho,2)}<div style="font-size:9px;color:var(--faint);font-weight:500">ICE máx</div></div>
        <div class="cm esf"><span class="tag" style="background:${compColor(o.comp)}22;color:${compColor(o.comp)}">${o.comp}</span><div style="margin-top:4px;color:${cidx.length?'var(--good)':'var(--faint)'}">${cidx.length}/${o.nPdv} · ${nf(cp,0)} pts</div></div>
        <div class="chev">▶</div>
      </div>
      <div class="pilcompare" data-cmp="${o.pilar}">${compareHTML(o)}</div>
      <div class="pilbody">
        <div class="tools"><span style="font-size:10px;color:var(--faint);font-family:'IBM Plex Mono'">AÇÃO PADRÃO</span><select class="dft" data-dft="${o.pilar}">${ACOES.filter(a=>a!==SEM).map(a=>`<option ${a===DFT[o.pilar]?'selected':''}>${a}</option>`).join('')}</select><button class="cbtn sm" data-all="${o.pilar}">Aplicar a todos</button><button class="cbtn sm" data-top="${o.pilar}">Top 10 perdas</button><button class="cbtn sm" data-clr="${o.pilar}">Limpar</button><input placeholder="filtrar cliente / rota / supervisão" data-flt="${o.pilar}" value="${(filt[o.pilar]||'')}"></div>
        <div class="pdvlist" data-list="${o.pilar}"></div>
      </div></div>`;}).join('');
  document.querySelectorAll('.pilhead').forEach(h=>h.onclick=e=>{if(e.target.closest('button,input,select'))return;const p=h.dataset.tg;openP[curGC]=openP[curGC]===p?null:p;drawPils();});
  g.opps.forEach(o=>{if(openP[curGC]===o.pilar)drawPdvList(o);});
  const dftOf=p=>{const s=document.querySelector(`[data-dft="${p}"]`);return s?s.value:DFT[p];};
  document.querySelectorAll('[data-all]').forEach(b=>b.onclick=()=>{const o=g.opps.find(x=>x.pilar===b.dataset.all),a=dftOf(b.dataset.all);o.pdvs.forEach((_,i)=>setAc(o.pilar,i,a));save();render();});
  document.querySelectorAll('[data-top]').forEach(b=>b.onclick=()=>{const o=g.opps.find(x=>x.pilar===b.dataset.top),a=dftOf(b.dataset.top);o.pdvs.slice(0,10).forEach((_,i)=>setAc(o.pilar,i,a));save();render();});
  document.querySelectorAll('[data-clr]').forEach(b=>b.onclick=()=>{const o=g.opps.find(x=>x.pilar===b.dataset.clr);acao[curGC][o.pilar]={};save();render();});
  document.querySelectorAll('[data-flt]').forEach(inp=>inp.oninput=()=>{filt[inp.dataset.flt]=inp.value;drawPdvList(g.opps.find(x=>x.pilar===inp.dataset.flt));});
}
function drawPdvList(o){const el=document.querySelector(`[data-list="${o.pilar}"]`);if(!el)return;const f=(filt[o.pilar]||'').toLowerCase();
  el.innerHTML=o.pdvs.map((p,i)=>{if(f&&!(`${p.n} ${p.c} ${p.rt} ${p.sv}`.toLowerCase().includes(f)))return '';const cur=getAc(o.pilar,i),on=cur!==SEM;
    let row=`<div class="pdvrow ${on?'on':''}"><div><div class="nm">${p.n}</div><div class="meta">cód ${p.cod} · ${p.c} · rota ${p.rt} · ${p.sv}</div></div><div class="pe ${on?'on':''}">${on?'+':''}${nf(p.pe,0)} pts</div><div class="ac"><select class="acaosel ${on?'on':''}" data-pl="${o.pilar}" data-i="${i}">${ACOES.map(a=>`<option ${a===cur?'selected':''}>${a}</option>`).join('')}</select></div></div>`;
    if(on){const pl=getPlan(o.pilar,i);const esc=v=>String(v==null?'':v).replace(/"/g,'&quot;');row+=`<div class="planrow"><span class="pllbl">📋</span><input class="pli" data-fld="prazo" data-pl="${o.pilar}" data-i="${i}" type="number" value="${esc(pl.prazo)}" style="width:60px"><span class="plu">dias</span><input class="pli" data-fld="resp" data-pl="${o.pilar}" data-i="${i}" value="${esc(pl.resp)}" placeholder="responsável" style="width:140px"><input class="pli" data-fld="obs" data-pl="${o.pilar}" data-i="${i}" value="${esc(pl.obs)}" placeholder="detalhe da execução neste cliente" style="flex:1;min-width:150px"></div>`;}
    return row;}).join('')||'<div class="empty">Nenhum cliente para este filtro.</div>';
  el.querySelectorAll('.acaosel').forEach(s=>s.onchange=()=>{setAc(s.dataset.pl,parseInt(s.dataset.i),s.value);save();drawPdvList(o);updateKpis();drawPilHeadMeta(o);updateCompare(o);drawPlan();drawWarn();refreshInsights();});
  el.querySelectorAll('.pli').forEach(inp=>inp.oninput=()=>{const pl=getPlan(inp.dataset.pl,parseInt(inp.dataset.i));pl[inp.dataset.fld]=inp.value;save();drawPlan();});
}
function compareHTML(o){const g=G();const cp=pilarPts(o);const pct=o.perdidos>0?Math.min(100,cp/o.perdidos*100):0;const iceC=cp/g.poss_total*100;const fp=o.perdidos-cp;const fi=o.ganho-iceC;
  return `<div class="pc-bar"><i style="width:${pct}%"></i></div><div class="pc-txt"><span>Revertido <b style="color:var(--good)">${nf(cp,0)}</b> / ${nf(o.perdidos,0)} pts</span><span>ICE <b style="color:var(--good)">+${nf(iceC,2)}</b> / +${nf(o.ganho,2)}</span><span class="diff">${cp>0?'faltam '+nf(fp,0)+' pts · +'+nf(fi,2)+' ICE':'nenhuma reversão ainda'}</span><span class="pct">${nf(pct,0)}%</span></div>`;}
function updateCompare(o){const el=document.querySelector(`[data-cmp="${o.pilar}"]`);if(el)el.innerHTML=compareHTML(o);}
function drawPilHeadMeta(o){const c=document.querySelector(`.pilcard[data-p="${o.pilar}"] .cm`);if(c){const ci=committedIdx(o);const d=c.querySelector('div');d.style.color=ci.length?'var(--good)':'var(--faint)';d.textContent=`${ci.length}/${o.nPdv} · ${nf(pilarPts(o),0)} pts`;}}
function updateKpis(){const t=totals();const set=(id,v,c)=>{const e=document.getElementById(id);if(e){e.innerHTML=v;if(c)e.style.color=c;}};
  set('kIce',nf(t.ice)+'<small>%</small>',colorFor(t.ice));set('kGap',((t.ice-meta)>=0?'+':'')+nf(t.ice-meta)+'<small> pts</small>',(t.ice-meta)>=0?'var(--good)':'var(--warn)');set('kCp',ptos(t.cp));set('kCn',t.cn);set('kNr',t.naoRev);
  document.getElementById('gg').innerHTML=gauge(t.ice,150,meta)+`<div class="center"><div class="num" style="font-size:30px;color:${colorFor(t.ice)}">${nf(t.ice)}</div><div class="eyebrow">simulado</div></div>`;}
function drawPlan(){const g=G();const items=g.opps.filter(o=>committedIdx(o).length>0).sort((a,b)=>pilarPts(b)-pilarPts(a));const el=document.getElementById('planList');
  if(!items.length){el.innerHTML='<div class="empty">Defina ações de reversão nos pilares.</div>';return;}
  el.innerHTML=items.map(o=>{const ci=committedIdx(o);const byA={};ci.forEach(i=>{const a=getAc(o.pilar,i);byA[a]=(byA[a]||0)+1;});const br=Object.entries(byA).map(([a,n])=>`${n}× ${a.toLowerCase()}`).join(' · ');
    return `<div class="planitem"><div class="t">${o.pilarLabel} — ${ci.length} clientes</div><div class="m">+${nf(pilarPts(o)/g.poss_total*100,2)} ICE · ${nf(pilarPts(o),0)} pts</div><div class="m" style="color:var(--brand-2)">${br}</div></div>`;}).join('');}
function optimize(){const g=G();g.opps.forEach(o=>acao[curGC][o.pilar]={});
  let flat=[];g.opps.forEach(o=>o.pdvs.forEach((p,i)=>flat.push({pl:o.pilar,i,pe:p.pe})));flat.sort((a,b)=>b.pe-a.pe);
  let ice=g.ice;for(const x of flat){if(ice>=meta)break;setAc(x.pl,x.i,DFT[x.pl]);ice=Math.min(110,ice+x.pe/g.poss_total*100);}save();render();}
function exportExcel(){const g=G(),t=totals();
  if(t.cn===0){alert('Defina ao menos uma ação de reversão antes de exportar.');return;}
  const head=['Gerência','Cidade','Líder','Pilar','Pergunta / Padrão','Código (PV)','Cliente (PDV)','Canal','Rota','Supervisão','Pontos perdidos','Ação de reversão','Prazo (dias)','Responsável','Observação / execução'];
  const rows=[head];
  g.opps.forEach(o=>committedIdx(o).forEach(i=>{const p=o.pdvs[i],pl=getPlan(o.pilar,i);rows.push([curGC,g.nome,lider||'',o.pilarLabel,o.pergunta,p.cod||'',p.n,p.c,p.rt,p.sv,nf(p.pe,0),getAc(o.pilar,i),pl.prazo,pl.resp||'',pl.obs||'']);}));
  rows.push([]);rows.push(['RESUMO DO COMPROMISSO']);rows.push(['Gerência',curGC+' · '+g.nome]);rows.push(['Líder',lider||'']);rows.push(['Meta (%)',meta]);rows.push(['ICE atual',nf(g.ice)]);rows.push(['ICE simulado',nf(t.ice)]);rows.push(['Pontos perdidos (total)',nf(g.perdidos_total,0)]);rows.push(['Pontos revertidos',nf(t.cp,0)]);rows.push(['Clientes com ação',t.cn]);rows.push(['Clientes sem reversão',t.naoRev]);rows.push(['Gerado em',new Date().toLocaleString('pt-BR')]);
  const csv='\ufeff'+rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='compromisso_'+curGC.replace(/[^A-Za-z0-9]/g,'')+'_'+(lider||'lider').replace(/[^A-Za-z0-9]/g,'')+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
function buildPayload(){const g=G(),t=totals();const acoes=g.opps.filter(o=>committedIdx(o).length>0).map(o=>{const ci=committedIdx(o);const byA={};ci.forEach(i=>{const a=getAc(o.pilar,i);byA[a]=(byA[a]||0)+1;});
    return {pilar:o.pilar,label:o.pilarLabel,perdidos:Math.round(o.perdidos),pontos:Math.round(pilarPts(o)),nClientes:ci.length,ganhoEfetivo:+(pilarPts(o)/g.poss_total*100).toFixed(2),acoesResumo:byA,clientes:ci.map(i=>{const pl=getPlan(o.pilar,i);return {cod:o.pdvs[i].cod,nome:o.pdvs[i].n,rota:o.pdvs[i].rt,canal:o.pdvs[i].c,pontos:o.pdvs[i].pe,acao:getAc(o.pilar,i),prazo:pl.prazo,resp:pl.resp,obs:pl.obs};})};});
  return {tipo:'ice_lider_v4',gerencia:curGC,nome:g.nome,lider:lider||'(sem nome)',ts:new Date().toISOString(),meta,iceBase:g.ice,iceSim:+t.ice.toFixed(2),clientes:g.clientes,perdidosTotal:g.perdidos_total,pontosRevertidos:Math.round(t.cp),clientesComAcao:t.cn,clientesSemReversao:t.naoRev,ganho:+(t.ice-g.ice).toFixed(2),metaAtingida:t.ice>=meta,token:SYNC_TOKEN,acoes};}
function exportJSON(){const data=buildPayload();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='ice_'+curGC.replace(/[^A-Za-z0-9]/g,'')+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);
  try{const bc=new BroadcastChannel('ice_consolida');bc.postMessage(data);bc.close();}catch(e){}
  try{localStorage.setItem('iceSub_'+curGC,JSON.stringify(data));}catch(e){}}
function setSync(msg,cls){const el=document.getElementById('syncStatus');if(el){el.textContent=msg;el.className='syncst '+(cls||'');}}
async function sendToCloud(){const t=totals();if(t.cn===0){alert('Defina ao menos uma ação de reversão antes de enviar.');return;}
  if(!SYNC_URL){alert('Conexão com o painel ainda não configurada. Use Exportar JSON por enquanto.');return;}
  const data=buildPayload();setSync('enviando…','load');
  try{const r=await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});let ok=true;try{const j=await r.json();ok=j.ok!==false;}catch(_){}
    setSync(ok?('✓ enviado às '+new Date().toLocaleTimeString('pt-BR')):'⚠ servidor recusou','ok');}
  catch(e){setSync('⚠ falha de envio — confira a internet (ou use Exportar JSON)','err');}
  try{const bc=new BroadcastChannel('ice_consolida');bc.postMessage(data);bc.close();}catch(e){}
  try{localStorage.setItem('iceSub_'+curGC,JSON.stringify(data));}catch(e){}}
document.getElementById('selGC').onchange=e=>{curGC=e.target.value;save();render();};
document.getElementById('lider').oninput=e=>{lider=e.target.value;save();};
document.getElementById('meta').oninput=e=>{meta=parseFloat(e.target.value)||0;save();render();};
document.getElementById('optBtn').onclick=optimize;
document.getElementById('clrBtn').onclick=()=>{const g=G();let has=g.opps.some(o=>committedIdx(o).length>0);if(has&&!confirm('Limpar todas as ações e voltar ao ICE atual?'))return;g.opps.forEach(o=>acao[curGC][o.pilar]={});save();render();};
document.getElementById('insBtn').onclick=()=>{showIns=!showIns;render();if(showIns)window.scrollTo({top:0,behavior:'smooth'});};document.getElementById('sendBtn').onclick=sendToCloud;document.getElementById('xlsBtn').onclick=exportExcel;document.getElementById('expBtn').onclick=exportJSON;
fill();render();
</script>

</body></html>
